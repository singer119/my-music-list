<script>
    // 在這裡填寫你的歌曲資訊
    const songs = [
        { title: "K.D - 被神明寫的歌", url: "K.D - 被神明寫的歌.mp3" },
        { title: "丁春洋 - 不謂俠", url: "丁春洋 - 不謂俠.mp3" },
        { title: "小璐 - 平凡日子里的挣扎", url: "小璐 - 平凡日子里的挣扎.mp3" },
        { title: "古風DJ - 難怯", url: "古風DJ - 難怯.mp3" },
        { title: "田園 - 先說愛的人為什麼先離開", url: "田園 - 先說愛的人為什麼先離開.mp3" },
        { title: "利比 - 跳樓機", url: "利比 - 跳樓機.mp3" },
        { title: "浩然 - 年少的你啊", url: "浩然 - 年少的你啊.mp3" }, // 補上 .mp3
        { title: "無", url: "無.mp3" }
    ];

    const audioPlayer = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const songTitle = document.getElementById('songTitle');

    // 生成播放清單
    songs.forEach((song, index) => {
        const li = document.createElement('li');
        li.innerText = song.title;
        li.onclick = () => playSong(index);
        playlist.appendChild(li);
    });

    function playSong(index) {
        // 這邊會自動處理 URL 編碼，避免中文出錯
        audioPlayer.src = encodeURI(songs[index].url);
        audioPlayer.play();
        songTitle.innerText = songs[index].title;
        
        document.querySelectorAll('li').forEach((el, i) => {
            el.className = i === index ? 'active' : '';
        });
    }
</script>
