<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人音樂電台</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .song-info { margin-bottom: 20px; }
        #songTitle { font-size: 1.2rem; color: #333; margin-bottom: 5px; height: 1.5em; overflow: hidden; }
        
        /* 按鈕樣式 */
        .controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin: 20px 0; }
        .btn { background: none; border: 2px solid var(--primary-color); color: var(--primary-color); padding: 10px 15px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--primary-color); color: #fff; }
        .btn-main { padding: 15px 25px; font-size: 1.1rem; }

        .playlist { text-align: left; list-style: none; padding: 0; margin-top: 20px; max-height: 200px; overflow-y: auto; border-top: 1px solid #eee; }
        .playlist li { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        .active { background: #e7f3ff; color: var(--primary-color); font-weight: bold; border-left: 4px solid var(--primary-color); }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="player">
    <div class="song-info">
        <h3 id="songTitle">準備就緒</h3>
    </div>

    <audio id="audioPlayer"></audio>

    <div class="controls">
        <button class="btn" onclick="prevSong()">上一首</button>
        <button class="btn btn-main" id="playPauseBtn" onclick="togglePlay()">播放</button>
        <button class="btn" onclick="nextSong()">下一首</button>
    </div>

    <ul class="playlist" id="playlist"></ul>
</div>

<script>
    const songs = [
        { title: "K.D - 被神明寫的歌", url: "K.D - 被神明寫的歌.mp3" },
        { title: "丁春洋 - 不謂俠", url: "丁春洋 - 不謂俠.mp3" },
        { title: "小璐 - 平凡日子里的挣扎", url: "小璐 - 平凡日子里的挣扎.mp3" },
        { title: "古風DJ - 難怯", url: "古風DJ - 難怯.mp3" },
        { title: "田園 - 先說愛的人為什麼先離開", url: "田園 - 先說愛的人為什麼先離開.mp3" },
        { title: "利比 - 跳樓機", url: "利比 - 跳樓機.mp3" },
        { title: "浩然 - 年少的你啊", url: "浩然 - 年少的你啊.mp3" },
        { title: "無", url: "無.mp3" }
    ];

    let currentTrack = 0;
    const audio = document.getElementById('audioPlayer');
    const title = document.getElementById('songTitle');
    const playBtn = document.getElementById('playPauseBtn');
    const playlist = document.getElementById('playlist');

    // 生成歌單
    songs.forEach((song, index) => {
        const li = document.createElement('li');
        li.innerText = (index + 1) + ". " + song.title;
        li.onclick = () => loadSong(index);
        playlist.appendChild(li);
    });

    function loadSong(index) {
        currentTrack = index;
        audio.src = encodeURI(songs[index].url);
        title.innerText = songs[index].title;
        
        // 更新樣式
        document.querySelectorAll('li').forEach((el, i) => {
            el.className = i === index ? 'active' : '';
        });
        
        playBtn.innerText = "暫停";
        audio.play();
    }

    function togglePlay() {
        if (audio.paused) {
            if (!audio.src) { loadSong(0); } else { audio.play(); playBtn.innerText = "暫停"; }
        } else {
            audio.pause();
            playBtn.innerText = "播放";
        }
    }

    function nextSong() {
        currentTrack = (currentTrack + 1) % songs.length;
        loadSong(currentTrack);
    }

    function prevSong() {
        currentTrack = (currentTrack - 1 + songs.length) % songs.length;
        loadSong(currentTrack);
    }

    // 當歌曲播放結束，自動跳下一首
    audio.onended = () => {
        nextSong();
    };
</script>

</body>
</html>
