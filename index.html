<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬音樂清單</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        audio { width: 100%; margin: 15px 0; }
        .playlist { text-align: left; list-style: none; padding: 0; max-height: 150px; overflow-y: auto; }
        .playlist li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .playlist li:hover { background: #f0f0f0; }
        .active { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="player">
    <img src="cover.jpg" alt="封面圖">
    <h3 id="songTitle">請選擇歌曲</h3>
    <audio id="audioPlayer" controls></audio>
    
    <ul class="playlist" id="playlist">
        </ul>
</div>

<script>
    // 在這裡填寫你的歌曲資訊
    const songs = [
        { title: "我的第一首 AI 音樂", url: "music/song1.mp3" },
        { title: "好聽的節奏", url: "music/song2.mp3" },
        { title: "這首沒廣告", url: "music/song3.mp3" }
    ];

    const audioPlayer = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const songTitle = document.getElementById('songTitle');

    songs.forEach((song, index) => {
        const li = document.createElement('li');
        li.innerText = song.title;
        li.onclick = () => playSong(index);
        playlist.appendChild(li);
    });

    function playSong(index) {
        audioPlayer.src = songs[index].url;
        audioPlayer.play();
        songTitle.innerText = songs[index].title;
        
        // 更新樣式
        document.querySelectorAll('li').forEach((el, i) => {
            el.className = i === index ? 'active' : '';
        });
    }
</script>

</body>
</html>
